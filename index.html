<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Em Breve</title>

<style>

body{
    margin:0;
    height:100vh;
    font-family:Arial, Helvetica, sans-serif;
    background:#020617;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

/* CARD PRINCIPAL */
.container{
    width:90%;
    max-width:1000px;
    height:500px;
    display:flex;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 0 40px rgba(0,120,255,.4);
}

/* AREA FOTO */
.image-area{
    width:50%;
    position:relative;
    background:black;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* SLIDES */
.slide{
    position:absolute;
    width:100%;
    height:100%;
    opacity:0;
    transition:opacity 1s ease-in-out;

    display:flex;
    justify-content:center;
    align-items:center;
}

.slide.active{
    opacity:1;
}

/* IMAGEM CENTRALIZADA */
.slide img{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center;
}

/* AREA TEXTO */
.content{
    width:50%;
    background:#020617;
    padding:40px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

h1{
    font-size:38px;
    margin-bottom:20px;
}

/* CONTADOR */
.countdown{
    display:flex;
    gap:15px;
}

.box{
    background:#0f172a;
    padding:20px;
    border-radius:12px;
    text-align:center;
    min-width:80px;
    box-shadow:0 0 15px rgba(0,150,255,.5);
    animation:pulse 2s infinite;
}

.box span{
    font-size:30px;
    font-weight:bold;
    display:block;
}

.label{
    font-size:12px;
    opacity:.8;
}

/* ANIMAÇÃO */
@keyframes pulse{
    0%{transform:scale(1)}
    50%{transform:scale(1.05)}
    100%{transform:scale(1)}
}

/* RESPONSIVO */
@media(max-width:900px){

.container{
    flex-direction:column;
    height:auto;
}

.image-area,
.content{
    width:100%;
    height:300px;
}

}

</style>
</head>

<body>

<div class="container">

    <!-- AREA IMAGENS -->
    <div class="image-area">

        <div class="slide active">
            <img src="foto1.jpeg">
        </div>

        <div class="slide">
            <img src="foto2.jpeg">
        </div>

        <div class="slide">
            <img src="foto3.jpeg">
        </div>

    </div>

    <!-- AREA TEXTO -->
    <div class="content">

        <h1>Estamos Chegando 🚀</h1>

        <div class="countdown">
            <div class="box">
                <span id="days">00</span>
                <div class="label">Dias</div>
            </div>

            <div class="box">
                <span id="hours">00</span>
                <div class="label">Horas</div>
            </div>

            <div class="box">
                <span id="minutes">00</span>
                <div class="label">Min</div>
            </div>

            <div class="box">
                <span id="seconds">00</span>
                <div class="label">Seg</div>
            </div>
        </div>

    </div>

</div>

<script>

/* ======================
   CONTADOR
====================== */

const launchDate = new Date("Dec 31, 2026 00:00:00").getTime();

setInterval(() => {

    const now = new Date().getTime();
    const diff = launchDate - now;

    document.getElementById("days").innerText =
        Math.floor(diff/(1000*60*60*24));

    document.getElementById("hours").innerText =
        Math.floor((diff%(1000*60*60*24))/(1000*60*60));

    document.getElementById("minutes").innerText =
        Math.floor((diff%(1000*60*60))/(1000*60));

    document.getElementById("seconds").innerText =
        Math.floor((diff%(1000*60))/1000);

},1000);


/* ======================
   SLIDE AUTOMÁTICO
====================== */

const slides = document.querySelectorAll(".slide");

let index = 0;

setInterval(()=>{

    slides[index].classList.remove("active");

    index = (index + 1) % slides.length;

    slides[index].classList.add("active");

},2000);

</script>

</body>
</html>
