<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pedro & Julia</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
background:radial-gradient(circle,#0b1224,#02040c);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:420px;
background:#050a18;
padding:25px;
border-radius:25px;
text-align:center;
box-shadow:0 0 40px rgba(0,0,0,.8);
}

/* PLAYER */

.player{
background:linear-gradient(135deg,#28437c,#3f6bd4);
padding:12px;
border-radius:18px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.player button{
border:none;
background:white;
border-radius:50%;
width:40px;
height:40px;
cursor:pointer;
font-size:16px;
}

/* SLIDESHOW */

.slideshow{
position:relative;
width:100%;
height:430px;
overflow:hidden;
border-radius:20px;
border:3px solid #7b8cff;
margin-top:10px;
}

.slide{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:opacity 1s ease-in-out;
}

.slide.active{
opacity:1;
}

/* CONTADOR */

.counter-wrapper{
margin-top:20px;
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

.time-box{
background:linear-gradient(135deg,#6fa8ff,#c07bff);
padding:14px;
border-radius:15px;
width:80px;
box-shadow:0 0 18px rgba(111,168,255,.5);
animation:pulse 3s infinite;
}

.time-number{
font-size:22px;
font-weight:bold;
}

.time-label{
font-size:11px;
opacity:.85;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.06)}
100%{transform:scale(1)}
}

/* TEXTO */

.text{
margin-top:18px;
font-size:13px;
line-height:1.6;
opacity:.9;
}

/* BOTÃO */

.btn{
margin-top:20px;
background:linear-gradient(135deg,#6fa8ff,#c07bff);
border:none;
padding:12px 25px;
border-radius:999px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
}

.names{
margin-top:18px;
opacity:.7;
letter-spacing:2px;
font-size:12px;
}

</style>
</head>

<body onclick="startMusicOnce()">

<div class="container">

<audio id="player-audio" src="alice-jaguadarte.mp3"></audio>

<div class="player">
<div>
<strong>Alice e o Jaguadarte</strong><br>
<small>Pedro & Julia</small>
</div>
<button onclick="startMusicOnce()">▶</button>
</div>

<!-- SLIDESHOW -->
<div class="slideshow">
<img src="foto1.jpeg" class="slide active">
<img src="foto2.jpeg" class="slide">
<img src="foto3.jpeg" class="slide">
</div>

<h2 style="margin-top:15px;">Pedro & Julia 💙</h2>
<p>Desde 02 de Março de 2025 às 18:00</p>

<!-- CONTADOR -->
<div class="counter-wrapper">

<div class="time-box">
<div id="days" class="time-number">0</div>
<div class="time-label">Dias</div>
</div>

<div class="time-box">
<div id="hours" class="time-number">0</div>
<div class="time-label">Horas</div>
</div>

<div class="time-box">
<div id="minutes" class="time-number">0</div>
<div class="time-label">Min</div>
</div>

<div class="time-box">
<div id="seconds" class="time-number">0</div>
<div class="time-label">Seg</div>
</div>

</div>

<p class="text">
Cada segundo ao seu lado vira eternidade.
Nosso amor continua crescendo todos os dias 💙
</p>

<button class="btn">Eu te amo 💙</button>

<div class="names">
PEDRO • JULIA
</div>

</div>

<script>

/* =========================
   MÚSICA AUTOMÁTICA
========================= */

let musicStarted=false;

function startMusicOnce(){
if(musicStarted) return;
musicStarted=true;

const audio=document.getElementById("player-audio");
audio.currentTime=106;
audio.play().catch(()=>{});
}

/* =========================
   CONTADOR BRASÍLIA
========================= */

const startDate=new Date("2025-03-02T18:00:00-03:00");

function updateCounter(){

const now=new Date();
const diff=now-startDate;

document.getElementById("days").innerText=
Math.floor(diff/(1000*60*60*24));

document.getElementById("hours").innerText=
Math.floor((diff/(1000*60*60))%24);

document.getElementById("minutes").innerText=
Math.floor((diff/(1000*60))%60);

document.getElementById("seconds").innerText=
Math.floor((diff/1000)%60);

}

setInterval(updateCounter,1000);
updateCounter();

/* =========================
   SLIDESHOW AUTOMÁTICO
========================= */

let currentSlide=0;
const slides=document.querySelectorAll(".slide");

setInterval(()=>{

slides[currentSlide].classList.remove("active");

currentSlide++;
if(currentSlide>=slides.length){
currentSlide=0;
}

slides[currentSlide].classList.add("active");

},2000);

</script>

</body>
</html>
