<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pedro & Julia ❤️</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(180deg,#020617,#020617,#000814);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

/* CARD PRINCIPAL */

.container{
    text-align:center;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(12px);
    padding:35px;
    border-radius:25px;
    width:350px;
    box-shadow:0 0 40px rgba(0,0,0,0.5);
}

/* FOTO */

.foto{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid #7b68ee;
}

/* BOX CONTADOR */

.contador-box{
    margin-top:25px;
    padding:25px;
    border-radius:20px;
    position:relative;
}

/* BORDA ANIMADA */

.contador-box::before{
    content:"";
    position:absolute;
    inset:-2px;
    border-radius:20px;
    background:linear-gradient(
        45deg,
        #00bfff,
        #7b68ee,
        #ff4ecd,
        #00bfff
    );
    z-index:-1;
    animation:brilho 6s linear infinite;
}

@keyframes brilho{
    0%{filter:hue-rotate(0deg);}
    100%{filter:hue-rotate(360deg);}
}

/* CONTADOR */

.contador{
    font-size:22px;
    font-weight:bold;
    margin-top:10px;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.05);}
    100%{transform:scale(1);}
}

/* BOTÃO */

.botao-amor{
    display:inline-block;
    margin-top:25px;
    padding:15px 35px;
    border-radius:40px;
    background:linear-gradient(45deg,#00bfff,#ff4ecd);
    color:white;
    font-weight:bold;
    text-decoration:none;
    box-shadow:0 0 20px rgba(255,255,255,0.3);
    transition:.3s;
}

.botao-amor:hover{
    transform:scale(1.1);
}

/* CORAÇÕES */

@keyframes subir{
    from{
        transform:translateY(0);
        opacity:1;
    }
    to{
        transform:translateY(-100vh);
        opacity:0;
    }
}

</style>
</head>

<body>

<div class="container">

<img src="foto.jpeg" class="foto">

<h2>Pedro & Julia 💙</h2>
<p>Desde 02 de Março de 2025 às 18:00</p>

<div class="contador-box">

<div class="contador">
Estamos juntos há ❤️
<br><br>
<span id="tempo"></span>
</div>

<p>Cada segundo ao seu lado é especial ✨</p>

</div>

<a class="botao-amor" onclick="tocarMusica()">Eu te amo 💙</a>

<audio id="musica" src="alice-jaguadarte.mp3"></audio>

</div>

<script>

/* CONTADOR SINCRONIZADO BRASILIA */

const inicio = new Date("2025-03-02T18:00:00-03:00");

function atualizarTempo(){

const agora = new Date();

let diff = agora - inicio;

let dias = Math.floor(diff/(1000*60*60*24));
let horas = Math.floor((diff/(1000*60*60))%24);
let minutos = Math.floor((diff/(1000*60))%60);
let segundos = Math.floor((diff/1000)%60);

document.getElementById("tempo").innerHTML =
`${dias} dias ${horas}h ${minutos}m ${segundos}s`;

}

setInterval(atualizarTempo,1000);

/* TOCAR MUSICA */

function tocarMusica(){
document.getElementById("musica").play();
}

/* CORAÇÕES FLUTUANDO */

setInterval(()=>{
const heart=document.createElement("div");
heart.innerHTML="💙";
heart.style.position="fixed";
heart.style.left=Math.random()*100+"vw";
heart.style.bottom="0";
heart.style.fontSize="20px";
heart.style.animation="subir 6s linear";
document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);

},800);

</script>

</body>
</html>
